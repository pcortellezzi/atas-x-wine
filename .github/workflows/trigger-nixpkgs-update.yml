name: Trigger nixpkgs update
on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repository_dispatch to nixpkgs
        run: |
          curl -L -X POST \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/pcortellezzi/nixpkgs/dispatches \
            -d '{"event_type":"update-atas-x-wine","client_payload":{"ref":"${{ github.sha }}"}}'
